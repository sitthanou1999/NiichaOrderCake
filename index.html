<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niichá Cafe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#f5ebe0;
    color:#333;
}

header{
    background:linear-gradient(135deg,#689080,#8eb5a5);
    color:white;
    padding:35px 20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

header h1{
    font-size:3rem;
}

header p{
    margin-top:10px;
    opacity:0.9;
}

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:30px 0;
}

.top-bar{
    display:flex;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
    align-items:center;
}

.search-box{
    flex:1;
    min-width: 250px;
}

.search-box input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:16px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* Category Filter Tabs */
.category-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.tab-btn {
    padding: 10px 20px;
    border: none;
    background: white;
    color: #689080;
    font-weight: 600;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.tab-btn.active, .tab-btn:hover {
    background: #689080;
    color: white;
}

.cart-btn{
    border:none;
    background:#689080;
    color:white;
    padding:15px 25px;
    border-radius:15px;
    cursor:pointer;
    font-weight:700;
    transition: transform 0.2s;
}

.cart-btn.bump {
    transform: scale(1.1);
}

.cake-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:0.3s;
    display: flex;
    flex-direction: column;
}

.card:hover{
    transform:translateY(-8px);
}

.card-image{
    width:100%;
    height:320px;
    background:#f7f7f7;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:10px;
    position: relative;
}

.card img{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    border-radius:18px;
}

.gallery-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0, 0, 0, 0.4);
    color: white;
    border: none;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
}
.gallery-btn:hover {
    background: rgba(0, 0, 0, 0.7);
}
.gallery-prev { left: 15px; }
.gallery-next { right: 15px; }

.image-dots {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    background: rgba(0,0,0,0.2);
    padding: 4px 8px;
    border-radius: 10px;
}
.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
}
.dot.active {
    background: white;
    width: 12px;
    border-radius: 4px;
}

.card-content{
    padding:20px;
    flex-grow: 1;
}

.card-title{
    font-size:1.3rem;
    font-weight:700;
    margin-bottom:10px;
}

.card-price{
    color:#689080;
    font-weight:700;
    margin-bottom:15px;
}

.card-actions{
    display:flex;
    gap:10px;
    padding:0 20px 20px;
}

.btn{
    flex:1;
    border:none;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
}

.btn-cart{
    background:#689080;
    color:white;
}

.btn-delete{
    background:#ff5d5d;
    color:white;
    display: none;
}

.admin-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    width:70px;
    height:70px;
    border:none;
    border-radius:50%;
    background:#689080;
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:999;
}

.admin-panel{
    position:fixed;
    top:0;
    right:-450px;
    width:400px;
    height:100vh;
    background:white;
    padding:25px;
    overflow:auto;
    transition:0.4s;
    z-index:1000;
    box-shadow:-10px 0 30px rgba(0,0,0,0.15);
}

.admin-panel.active{
    right:0;
}

.admin-panel input,
.admin-panel textarea,
.admin-panel select{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    margin-bottom:15px;
}

.admin-panel button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#689080;
    color:white;
    font-weight:700;
    cursor:pointer;
    margin-bottom:10px;
}

.cart-modal,
.login-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.modal-content{
    background:white;
    width:95%;
    max-width:550px;
    border-radius:25px;
    padding:25px;
    max-height:90vh;
    overflow:auto;
}

.modal-content h2{
    color:#689080;
    margin-bottom:20px;
}

.cart-item{
    background: #fdfbf7;
    border: 1px solid #eedecf;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 15px;
}

.cart-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px dashed #ddd;
    padding-bottom: 8px;
    margin-bottom: 10px;
}

.quantity-control {
    display: flex;
    align-items: center;
    gap: 8px;
}

.qty-btn {
    background: #e0d4c8;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-weight: bold;
}

.cart-item-details label {
    font-size: 13px;
    font-weight: 600;
    color: #666;
    display: block;
    margin-top: 8px;
}

.cart-item-details input, .cart-item-details select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-top: 4px;
    font-size: 14px;
}

.checkout-btn{
    width:100%;
    border:none;
    padding:15px;
    border-radius:15px;
    background:#689080;
    color:white;
    font-weight:700;
    cursor:pointer;
    margin-top:15px;
}

.analytics{
    background:#f7f7f7;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}

.analytics p{
    margin-bottom:10px;
}

@media(max-width:768px){
    header h1{
        font-size:2rem;
    }
    .admin-panel{
        width:100%;
    }
    .card-image{
        height:260px;
    }
}
</style>
</head>
<body>

<header>
    <h1>Niichá Cafe</h1>
    <p>ເລືອກເຄັກທີ່ເຈົ້າມັກ (Try some of our favourites!)</p>
</header>

<div class="container">
    <div class="top-bar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ຄົ້ນຫາເຄັກ..." onkeyup="searchCake()">
        </div>
        <button class="cart-btn" id="cartBtn" onclick="openCart()">
            🛒 ກະຕ່າ (<span id="cartCount">0</span>)
        </button>
    </div>

    <div class="category-tabs" id="categoryTabs">
        <button class="tab-btn active" onclick="filterCategory('All')">ທັງໝົດ</button>
        <button class="tab-btn" onclick="filterCategory('Birthday')">Birthday</button>
        <button class="tab-btn" onclick="filterCategory('Wedding')">Wedding</button>
        <button class="tab-btn" onclick="filterCategory('Premium')">Premium</button>
    </div>

    <div class="cake-grid" id="cakeGrid"></div>
</div>

<button class="admin-toggle" onclick="openLogin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <h2>Admin Dashboard</h2>
    <input type="text" id="cakeName" placeholder="Cake Name">
    <input type="text" id="cakePrice" placeholder="Starting from 250,000 LAK">
    <input type="text" id="cakeImage" placeholder="Image URL (ຖ້າມີຫຼາຍຮູບ ໃຫ້ຍະຫວ່າງດ້ວຍເຄື່ອງໝາຍຈຸດ , )">
    <select id="cakeCategory">
        <option value="Birthday">Birthday</option>
        <option value="Wedding">Wedding</option>
        <option value="Premium">Premium</option>
    </select>
    <textarea id="cakeDescription" placeholder="Description"></textarea>
    <button id="saveCakeBtn" onclick="saveCake()">Add Cake</button>

    <div class="analytics">
        <h3>Analytics</h3>
        <p>Total Cakes: <span id="totalCakes">0</span></p>
    </div>
</div>

<div class="cart-modal" id="cartModal">
    <div class="modal-content">
        <h2>Shopping Cart</h2>
        <div id="cartItems"></div>
        
        <button class="checkout-btn" onclick="checkout()">Checkout via WhatsApp</button>
        <button class="checkout-btn" onclick="closeCart()" style="background:#999; margin-top: 8px;">Close</button>
    </div>
</div>

<div class="login-modal" id="loginModal">
    <div class="modal-content">
        <h2>Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Enter Password">
        <button class="checkout-btn" onclick="loginAdmin()">Login</button>
        <button class="checkout-btn" onclick="document.getElementById('loginModal').style.display='none'" style="background:#999; margin-top: 8px;">Cancel</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// ຄ່າ Config ຂອງໂຄງການ niicha-stock ຂອງທ່ານ
const firebaseConfig = {
    apiKey: "AIzaSyAEVdN1IpNbbN43yHUtNHC2s9K435LXlnA",
    authDomain: "niicha-stock.firebaseapp.com",
    projectId: "niicha-stock",
    storageBucket: "niicha-stock.firebasestorage.app",
    messagingSenderId: "1077404537823",
    appId: "1:1077404537823:web:161f842ed2bbb837bd6a6a"
};

// ເລີ່ມຕົ້ນລະບົບ Firebase ແລະ Firestore
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📌 ວິທີແຍກ: ຕັ້ງຊື່ Collection ໃໝ່ເປັນ 'cakes' ຈະບໍ່ໄປທັບກັບ 'products' ເກົ່າຂອງທ່ານ
const cakesCollection = collection(db, "cakes");

let cakes = [];
let activeImageIndexes = {};
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let currentCategory = 'All';
let isAdmin = false;
let editingCakeId = null;

// 🔄 ດຶງຂໍ້ມູນຈາກ Cloud Firestore ແບບ Real-time (.onSnapshot)
onSnapshot(cakesCollection, (snapshot) => {
    cakes = [];
    snapshot.forEach((doc) => {
        cakes.push({ id: doc.id, ...doc.data() });
    });
    renderCakes();
});

window.changeImage = function(cakeId, direction, totalImages) {
    if (!activeImageIndexes[cakeId]) activeImageIndexes[cakeId] = 0;
    activeImageIndexes[cakeId] += direction;
    
    if (activeImageIndexes[cakeId] < 0) {
        activeImageIndexes[cakeId] = totalImages - 1;
    } else if (activeImageIndexes[cakeId] >= totalImages) {
        activeImageIndexes[cakeId] = 0;
    }
    
    const imgEl = document.getElementById(`img-${cakeId}`);
    const cake = cakes.find(c => c.id == cakeId);
    const imgList = cake.images || [];
    if (imgEl && imgList[activeImageIndexes[cakeId]]) {
        imgEl.src = imgList[activeImageIndexes[cakeId]];
    }
    
    const dots = document.querySelectorAll(`.dot-${cakeId}`);
    dots.forEach((dot, idx) => {
        if(idx === activeImageIndexes[cakeId]) {
            dot.classList.add('active');
        } else {
            dot.classList.remove('active');
        }
    });
}

window.renderCakes = function(){
    const grid = document.getElementById('cakeGrid');
    grid.innerHTML = '';

    const filteredCakes = cakes.filter(cake => currentCategory === 'All' || cake.category === currentCategory);

    filteredCakes.forEach(cake => {
        const imgList = cake.images || ["https://via.placeholder.com/320"];
        if (!activeImageIndexes[cake.id]) activeImageIndexes[cake.id] = 0;
        const currentIdx = activeImageIndexes[cake.id];

        let galleryControls = '';
        let dotsHtml = '';
        if(imgList.length > 1) {
            galleryControls = `
                <button class="gallery-btn gallery-prev" onclick="changeImage('${cake.id}', -1, ${imgList.length})">◀</button>
                <button class="gallery-btn gallery-next" onclick="changeImage('${cake.id}', 1, ${imgList.length})">▶</button>
            `;
            
            dotsHtml = `<div class="image-dots">`;
            imgList.forEach((_, idx) => {
                dotsHtml += `<span class="dot dot-${cake.id} ${idx === currentIdx ? 'active' : ''}"></span>`;
            });
            dotsHtml += `</div>`;
        }

        grid.innerHTML += `
        <div class="card">
            <div class="card-image">
                <img id="img-${cake.id}" src="${imgList[currentIdx]}" alt="${cake.name}">
                ${galleryControls}
                ${dotsHtml}
            </div>
            <div class="card-content">
                <div class="card-title">${cake.name}</div>
                <div class="card-price">${cake.price}</div>
                <p style="color:#777; font-size:14px;">${cake.description}</p>
            </div>
            <div class="card-actions">
                <button class="btn btn-cart" onclick="addToCart('${cake.id}')">ເພີ່ມເຂົ້າກະຕ່າ</button>
                <button class="btn"
                    style="background:#f39c12;color:white;display:${isAdmin ? 'block' : 'none'}"
                    onclick="editCake('${cake.id}')">
                    Edit
                </button>
                <button class="btn btn-delete"
                    style="display:${isAdmin ? 'block' : 'none'}"
                    onclick="deleteCake('${cake.id}')">
                    Delete
                </button>
            </div>
        </div>
        `;
    });
    updateAnalytics();
}

window.filterCategory = function(category) {
    currentCategory = category;
    const buttons = document.querySelectorAll('.tab-btn');
    buttons.forEach(btn => {
        if(btn.innerText === (category === 'All' ? 'ທັງໝົດ' : category)) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    renderCakes();
}

window.addToCart = function(id){
    const cake = cakes.find(c => c.id == id);
    const existingItem = cart.find(item => item.id == id);
    if (existingItem) {
        existingItem.quantity += 1;
    } else {
        cart.push({
            id: cake.id,
            name: cake.name,
            price: cake.price,
            quantity: 1,
            size: '1 ປອນ',
            message: '',
            specialRequest: '',
            pickupDate: ''
        });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    
    const cartBtn = document.getElementById('cartBtn');
    cartBtn.classList.add('bump');
    setTimeout(() => cartBtn.classList.remove('bump'), 200);
}

window.updateCartCount = function(){
    const count = cart.reduce((total, item) => total + item.quantity, 0);
    document.getElementById('cartCount').innerText = count;
}

window.openCart = function(){
    document.getElementById('cartModal').style.display = 'flex';
    renderCart();
}

window.closeCart = function(){
    document.getElementById('cartModal').style.display = 'none';
}

window.renderCart = function(){
    const container = document.getElementById('cartItems');
    container.innerHTML = '';

    if(cart.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">ບໍ່ມີສິນຄ້າໃນກະຕ່າ</p>';
        return;
    }

    cart.forEach((item, index) => {
        container.innerHTML += `
        <div class="cart-item">
            <div class="cart-item-header">
                <div>
                    <strong>${item.name}</strong> <span style="color:#689080;">(${item.price})</span>
                </div>
                <div class="quantity-control">
                    <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                    <span>${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                </div>
            </div>
            
            <div class="cart-item-details">
                <label>📏 ຂະໜາດເຄັກ:</label>
                <select onchange="updateCartDetails(${index}, 'size', this.value)">
                    <option value="1 ປອນ" ${item.size === '1 ປອນ' ? 'selected' : ''}>1 ປອນ</option>
                    <option value="2 ປອນ" ${item.size === '2 ປອນ' ? 'selected' : ''}>2 ປອນ</option>
                    <option value="3 ປອນ" ${item.size === '3 ປອນ' ? 'selected' : ''}>3 ປອນ</option>
                    <option value="4 ປອນ" ${item.size === '4 ປອນ' ? 'selected' : ''}>4 ປອນ</option>
                    <option value="5 ປອນ" ${item.size === '5 ປອນ' ? 'selected' : ''}>5 ປອນ</option>
                </select>

                <label>✍️ ຂໍ້ຄວາມເທິງໜ້າເຄັກ:</label>
                <input type="text" value="${item.message}" onchange="updateCartDetails(${index}, 'message', this.value)">

                <label>✨ ເພີ່ມເຕີມພິເສດ (ຖ້າມີ):</label>
                <textarea
                    style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-top:4px;min-height:80px;"
                    placeholder="ເຊັ່ນ: ຂໍສີຟ້າ, ໃສ່ຕຸກກະຕາ, ຕົກແຕ່ງແບບພິເສດ..."
                    onchange="updateCartDetails(${index}, 'specialRequest', this.value)"
                >${item.specialRequest || ''}</textarea>

                <label>⏰ ວັນທີ ແລະ ເວລາຮັບເຄັກ: <span style="color:red;">*</span></label>
                <input type="datetime-local" value="${item.pickupDate}" onchange="updateCartDetails(${index}, 'pickupDate', this.value)">
            </div>
        </div>
        `;
    });
}

window.updateQty = function(index, change) {
    cart[index].quantity += change;
    if(cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
    updateCartCount();
}

window.updateCartDetails = function(index, field, value) {
    cart[index][field] = value;
    localStorage.setItem('cart', JSON.stringify(cart));
}

window.checkout = function(){
    if(cart.length === 0) {
        alert('ບໍ່ມີສິນຄ້າໃນກະຕ່າ');
        return;
    }

    let missingDate = cart.some(item => !item.pickupDate);
    if(missingDate) {
        alert('ກະລຸນາເລືອກ ວັນທີ ແລະ ເວລາຮັບເຄັກ ໃຫ້ຄົບຖ້ວນທຸກກ້ອນດ້ວຍເດີ້!');
        return;
    }

    let text = '🎂 *ລາຍລະອຽດການສັ່ງເຄັກຈາກ Niichá Cafe*%0A%0A';
    
    cart.forEach((item, idx) => {
        text += `*ກ້ອນທີ ${idx + 1}:* ${item.name}%0A`;
        text += `  - จຳນວນ: ${item.quantity} ກ້ອນ%0A`;
        text += `  - ຂະໜາດ: ${item.size}%0A`;
        text += `  - ຂໍ້ຄວາມເທິງໜ້າເຄັກ: ${item.message || 'ບໍ່ມີ'}%0A`;
        text += `  - ເພີ່ມເຕີມພິເສດ: ${item.specialRequest || 'ບໍ່ມີ'}%0A`;
        text += `  - ວັນເວລານັດຮັບ: ${item.pickupDate.replace('T', ' ')}%0A%0A`;
    });

// 💾 ບັນທຶກ ແລະ ອັບເດດລົງ Cloud Firestore (ແຍກ Collection)
window.saveCake = async function(){
    const name = document.getElementById('cakeName').value;
    const price = document.getElementById('cakePrice').value;
    const imageInput = document.getElementById('cakeImage').value;
    const category = document.getElementById('cakeCategory').value;
    const description = document.getElementById('cakeDescription').value;

    if(!name || !price || !imageInput){
        alert('ກະລຸນາໃສ່ຂໍ້ມູນໃຫ້ຄົບ');
        return;
    }

    const imagesArray = imageInput.split(',').map(url => url.trim()).filter(url => url !== '');

    try {
        if(editingCakeId){
            // ອັບເດດເຄັກກ້ອນເກົ່າໃນ Firestore
            const cakeDocRef = doc(db, "cakes", editingCakeId);
            await updateDoc(cakeDocRef, {
                name, price, images: imagesArray, category, description
            });
            editingCakeId = null;
            document.getElementById('saveCakeBtn').innerText = 'Add Cake';
        } else {
            // ເພີ່ມເຄັກກ້ອນໃໝ່ເຂົ້າ Firestore
            await addDoc(cakesCollection, {
                name, price, images: imagesArray, category, description
            });
        }

        document.getElementById('cakeName').value = '';
        document.getElementById('cakePrice').value = '';
        document.getElementById('cakeImage').value = '';
        document.getElementById('cakeDescription').value = '';
    } catch (e) {
        console.error("Error saving document: ", e);
    }
}

window.editCake = function(id){
    const cake = cakes.find(c => c.id == id);
    editingCakeId = id;

    document.getElementById('cakeName').value = cake.name;
    document.getElementById('cakePrice').value = cake.price;
    
    const imgList = cake.images || [];
    document.getElementById('cakeImage').value = imgList.join(', ');
    
    document.getElementById('cakeCategory').value = cake.category;
    document.getElementById('cakeDescription').value = cake.description;

    const btn = document.getElementById('saveCakeBtn');
    if(btn){
        btn.innerText = 'Update Cake';
    }
}

window.deleteCake = async function(id){
    if(confirm('ต้องการลบเค้กก้อนนี้ใช่หรือไม่?')) {
        try {
            await deleteDoc(doc(db, "cakes", id));
        } catch (e) {
            console.error("Error deleting document: ", e);
        }
    }
}
